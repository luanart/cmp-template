name: Debug build

on:
  push:
    branches: [debug]
  pull_request:
    branches: [debug]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096M -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    environment: DEBUG
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore firebase config
        uses: ./.github/actions/restore-firebase
        with:
          google_services_json: ${{ secrets.GOOGLE_SERVICES_JSON }}
          google_service_info_plist: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}

      - name: Gradle setup
        uses: ./.github/actions/gradle-setup

      - name: Run unit tests
        run: ./gradlew test

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/build/reports/tests/"

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    environment: DEBUG
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore firebase config
        uses: ./.github/actions/restore-firebase
        with:
          google_services_json: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Gradle setup
        uses: ./.github/actions/gradle-setup

      - name: Build Android debug APK
        run: ./gradlew :androidApp:assembleDebug

      - name: Upload artifact to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIALS }}
          groups: Internal
          file: androidApp/build/outputs/apk/debug/androidApp-debug.apk
          releaseNotes: "${{ github.event.head_commit.message }}"

  build-ios:
    name: Build iOS (Debug → Firebase)
    runs-on: macos-latest
    needs: test
    environment: DEBUG
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gradle setup
        uses: ./.github/actions/gradle-setup

      - name: Restore firebase config
        uses: ./.github/actions/restore-firebase
        with:
          google_service_info_plist: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}

      # -----------------------------
      # Install certificate only
      # -----------------------------
      - name: Install Apple certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      # -----------------------------
      # Setup App Store Connect API
      # -----------------------------
      - name: Setup App Store Connect API Key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "${{ secrets.APP_STORE_CONNECT_API_KEY }}" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

      # -----------------------------
      # ExportOptions (automatic)
      # -----------------------------
      - name: Create export options plist
        run: |
          cat <<EOF > $RUNNER_TEMP/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>

            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>

            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      # -----------------------------
      # Resolve SPM (Firebase)
      # -----------------------------
      - name: Resolve Swift Package dependencies
        run: |
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES
          xcodebuild -resolvePackageDependencies \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -clonedSourcePackagesDirPath ./SourcePackages

      # -----------------------------
      # Archive (automatic signing)
      # -----------------------------
      - name: Build iOS archive
        run: |
          xcodebuild archive \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/iosApp.xcarchive \
            -destination generic/platform=iOS \
            -clonedSourcePackagesDirPath ./SourcePackages \
            COMPILER_INDEX_STORE_ENABLE=NO \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/app-signing.keychain-db" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }} \
            -verbose

      # -----------------------------
      # Export IPA
      # -----------------------------
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/iosApp.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }} \
            -verbose

      # -----------------------------
      # Upload to Firebase
      # -----------------------------
      - name: Upload IPA to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_IOS_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIALS }}
          groups: Internal
          file: ${{ runner.temp }}/export/iosApp.ipa
          releaseNotes: "${{ github.event.head_commit.message }}"

      # -----------------------------
      # Cleanup
      # -----------------------------
      - name: Clean up keychain and API key
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
          rm -f ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8