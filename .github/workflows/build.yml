name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096M -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gradle setup
        uses: ./.github/actions/gradle-setup

      - name: Run unit tests
        run: ./gradlew test

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/build/reports/tests/"

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    environment: DEBUG
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gradle setup
        uses: ./.github/actions/gradle-setup

      - name: Restore google-services.json
        run: |
          mkdir -p androidApp/src/debug
          
          # Check if the secret is empty (happens if environment/name is mismatched)
          if [ -z "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo "Error: GOOGLE_SERVICES_JSON is empty. Check your Environment Secrets."
            exit 1
          fi
          
          # Decode the secret
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > androidApp/src/debug/google-services.json
          
          # Final check: is the file valid JSON?
          if ! jq '.' androidApp/src/debug/google-services.json > /dev/null 2>&1; then
            echo "Error: Decoded file is not valid JSON. Check your Base64 encoding."
            exit 1
          fi
          
          echo "google-services.json successfully restored."

      - name: Build Android debug APK
        run: ./gradlew :androidApp:assembleDebug

      - name: Upload Android debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: androidApp/build/outputs/apk/debug/*.apk


  build-ios:
    name: Build iOS simulator app
    runs-on: macos-latest
    needs: test
    environment: DEBUG
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gradle setup
        uses: ./.github/actions/gradle-setup

      - name: Restore GoogleService-Info.plist
        run: |
          # 1. Create the directory (matches your project structure)
          mkdir -p iosApp/iosApp/FirebaseConfig
          
          # 2. Check if secret exists
          if [ -z "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" ]; then
            echo "Error: GOOGLE_SERVICE_INFO_PLIST is empty. Check Environment Secrets."
            exit 1
          fi
          
          # 3. Decode to the specific filename Xcode expects
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > iosApp/iosApp/FirebaseConfig/Debug-GoogleService-Info.plist
          
          # 4. Verify file isn't empty
          if [ ! -s iosApp/iosApp/FirebaseConfig/Debug-GoogleService-Info.plist ]; then
            echo "Error: Plist file is empty after decoding."
            exit 1
          fi
          
          echo "GoogleService-Info.plist restored successfully."

      - name: Build iOS simulator app
        run: |
          xcodebuild build \
          -project iosApp/iosApp.xcodeproj \
          -configuration Debug \
          -scheme Debug \
          -sdk iphonesimulator \
          -derivedDataPath ./build \
          -verbose

      - name: Upload App Folder
        uses: actions/upload-artifact@v4
        with:
          name: iphonesimulator-app
          path: build/Build/Products/Debug-iphonesimulator/*