name: Deploy Debug App

on:
  push:
    branches: [debug]
  pull_request:
    branches: [debug]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096M -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    environment: Dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore firebase config
        uses: ./.github/actions/restore-firebase
        with:
          google_services_json: ${{ secrets.GOOGLE_SERVICE_JSON_BASE64 }}
          google_service_info_plist: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}

      - name: Gradle setup
        uses: ./.github/actions/gradle-setup

      - name: Run unit tests
        run: ./gradlew test

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/build/reports/tests/"

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    environment: Dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore firebase config
        uses: ./.github/actions/restore-firebase
        with:
          firebase_credentials: ${{ secrets.FIREBASE_CREDENTIALS_BASE64 }}
          google_services_json: ${{ secrets.GOOGLE_SERVICE_JSON_BASE64 }}

      - name: Gradle setup
        uses: ./.github/actions/gradle-setup

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Run Fastlane Android
        run: bundle exec fastlane android distribute_debug
        env:
          FIREBASE_APP_ID_ANDROID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: test
    environment: Dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore firebase config
        uses: ./.github/actions/restore-firebase
        with:
          firebase_credentials: ${{ secrets.FIREBASE_CREDENTIALS_BASE64 }}
          google_service_info_plist: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}

      - name: Gradle setup
        uses: ./.github/actions/gradle-setup

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Decode certificate and provisioning profile
        run: |
          echo "${{ secrets.IOS_CERTIFICATE_BASE64 }}" | base64 --decode > certificate.p12
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > profile.mobileprovision

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -version
          xcodebuild -resolvePackageDependencies \
          -project iosApp/iosApp.xcodeproj \
          -scheme iosApp

      - name: Run Fastlane iOS
        run: bundle exec fastlane ios distribute_debug
        env:
          FIREBASE_APP_ID_IOS: ${{ secrets.FIREBASE_APP_ID_IOS }}
          IOS_CERTIFICATE_PATH: certificate.p12
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_PATH: profile.mobileprovision
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: 120
          FASTLANE_XCODEBUILD_SETTINGS_RETRIES: 5