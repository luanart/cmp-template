name: Deploy Debug App

on:
  push:
    branches: [debug]
  pull_request:
    branches: [debug]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096M -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    environment: Dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore firebase config
        uses: ./.github/actions/restore-firebase
        with:
          google_services_json: ${{ secrets.GOOGLE_SERVICE_JSON_BASE64 }}
          google_service_info_plist: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}

      - name: Gradle setup
        uses: ./.github/actions/gradle-setup

      - name: Run unit tests
        run: ./gradlew test

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/build/reports/tests/"

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    environment: Dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore firebase config
        uses: ./.github/actions/restore-firebase
        with:
          firebase_credentials: ${{ secrets.FIREBASE_CREDENTIALS_BASE64 }}
          google_services_json: ${{ secrets.GOOGLE_SERVICE_JSON_BASE64 }}

      - name: Gradle setup
        uses: ./.github/actions/gradle-setup

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Run Fastlane Android
        run: bundle exec fastlane android distribute_debug
        env:
          FIREBASE_APP_ID_ANDROID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: test
    environment: Dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore firebase config
        uses: ./.github/actions/restore-firebase
        with:
          firebase_credentials: ${{ secrets.FIREBASE_CREDENTIALS_BASE64 }}
          google_service_info_plist: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}

      - name: Gradle setup
        uses: ./.github/actions/gradle-setup

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup App Store Connect API Key
        run: |
          echo "${{ secrets.ASC_KEY_CONTENT_BASE64 }}" | base64 --decode > AuthKey_${{ secrets.ASC_KEY_ID }}.p8

          - name: Run Fastlane iOS
            run: bundle exec fastlane ios distribute_debug
            env:
              FIREBASE_APP_ID_IOS: ${{ secrets.FIREBASE_APP_ID_IOS }}
              APP_STORE_CONNECT_KEY_ID: ${{ secrets.ASC_KEY_ID }}
              APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
              APP_STORE_CONNECT_KEY_FILE_PATH: AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Clean up API key
        run: rm -f AuthKey_${{ secrets.ASC_KEY_ID }}.p8